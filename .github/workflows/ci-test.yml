name: Laravel Frontend CI

on:
  push:
    branches: ["development", "main"]
  pull_request:
    branches: ["development", "main"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Kita kunci ke Node.js 16 agar cocok dengan Laravel Mix v6 kelompokmu
      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-node: "16"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # Di sini robot GitHub akan menge-build aset tampilan secara aman
      - name: Compile Assets (NPM Run Prod)
        run: npm run prod

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: public/
