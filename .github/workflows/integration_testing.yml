name: Automated PHPUnit Testing

# Matiin dullu
on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main", "development"]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    # 💡 KITA TIDAK BUTUH "services: postgres" LAGI KARENA SUDAH PAKAI AZURE ASLI!

    steps:
      - uses: actions/checkout@v4 # Update ke v4 biar seragam

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      - name: Run Migrations for Testing
        run: php artisan migrate --force --env=testing # Tambah --force karena mendeteksi db luar
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }} # 🔐 Aman pake GitHub Secrets

      - name: Execute PHPUnit Tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}
