name: 🚀 AUTOMATED DEMO - Parallel Staging & Production Pipeline

on:
  push:
    branches: ["demo"] # Jalat otomatis pas git push origin demo

jobs:
  # ==========================================
  # 🧪 JOB 1: RUN PHPUNIT AUTOMATED TESTING
  # ==========================================
  run-phpunit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: absensi_db_testing
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dev_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: absensi_db_testing
      DB_USERNAME: dev_user
      DB_PASSWORD: secret_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Copy .env.testing
        run: |
          php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      - name: Run Database Migration
        run: php artisan migrate --force --env=testing

      - name: Execute PHPUnit Test
        run: php artisan test --no-tty

  # ==========================================
  # 🔵 JOB 2: DEPLOY TO STAGING (NESHA WORKFLOW)
  # ==========================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: run-phpunit-test # 🔥 Jalan setelah test lulus

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, dom, fileinfo

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install & Compile Frontend Assets
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps
          npm run prod

      - name: Laravel Cache Optimization
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      - name: Log in to Docker Hub (Nesha)
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image (Staging)
        run: |
          docker build -t neshafwana/absensi-app:latest .
          docker push neshafwana/absensi-app:latest

      - name: Trigger Azure Staging Container Refresh
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'absen-pso-stagging'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'neshafwana/absensi-app:latest'

  # ==========================================
  # 🟢 JOB 3: DEPLOY TO PRODUCTION (AUL WORKFLOW)
  # ==========================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: run-phpunit-test # 🔥 Jalan PARALEL bareng Staging setelah test lulus!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, dom, fileinfo

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Run Database Migration to Azure Production
        env:
          DB_CONNECTION: pgsql
          DB_HOST: db-absensi-pso2.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: absensi_pso_production
          DB_USERNAME: pso14
          DB_PASSWORD: ${{ secrets.DB_PRODUCTION_PASSWORD }}
        run: php artisan migrate --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install & Compile Frontend Assets
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps
          npm run prod

      - name: Laravel Cache Optimization
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      - name: Log in to Docker Hub (Aul)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME_AUL }}
          password: ${{ secrets.DOCKER_PASSWORD_AUL }}

      - name: Build and Push Docker Image (Production)
        run: |
          docker build -t auliyaamalik/absensi-app:latest .
          docker push auliyaamalik/absensi-app:latest

      - name: Trigger Azure App Service Container Refresh (Production Server)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "absensi-pso-14"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AUL }}
          images: "auliyaamalik/absensi-app:latest"