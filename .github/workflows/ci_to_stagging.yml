name: Continuous Deployment to Staging

on:
  pull_request:
    branches: ["development"]

jobs:
  # ==========================================
  # 🧪 JOB 1: PHPUnit Testing
  # ==========================================
  run-phpunit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: absensi_db_testing
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dev_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: absensi_db_testing
      DB_USERNAME: dev_user
      DB_PASSWORD: secret_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      # ENV
      - name: Copy .env.testing
        run: |
          php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      # Composer
      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      # Generate Key
      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      # Migration
      - name: Run Database Migration
        run: php artisan migrate --force --env=testing

      # Testing
      - name: Execute PHPUnit Test
        run: php artisan test

  # ==========================================
  # 🐘 JOB 2: BACKEND BUILD
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest
    needs: run-phpunit-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      # Composer
      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      # Upload vendor
      - name: Upload Vendor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-vendor
          path: vendor/

  # ==========================================
  # 🎨 JOB 3: FRONTEND BUILD
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: run-phpunit-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js
      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      # Frontend dependencies
      - name: Install Frontend Dependencies
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps

      # Compile Assets
      - name: Compile Assets
        run: npm run prod

      # Upload frontend build
      - name: Upload Public Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-assets
          path: public/

  # ==========================================
  # 🚀 JOB 4: DOCKER BUILD & PUSH
  # ==========================================
  deploy-docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download vendor
      - name: Download Vendor Artifact
        uses: actions/download-artifact@v4
        with:
          name: php-vendor
          path: vendor/

      # Download frontend assets
      - name: Download Public Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: public-assets
          path: public/

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      # Laravel cleanup
      - name: Laravel Cleanup
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      # Docker build
      - name: Build Docker Image
        run: |
          docker build -t neshafwana/absensi-app:latest .

      # Docker login
      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Docker push
      - name: Push Docker Image
        run: |
          docker push neshafwana/absensi-app:latest

