name: Continuous Deployment to Staging

on:
  workflow_run:
    workflows: ["Automated PHPUnit Testing", "Laravel Frontend CI"] # ⬅️ Dikunci ke nama suci kakaknya
    types:
      - completed

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest
    # 🔐 GERBANG KEAMANAN MUTLAK: Hanya jalan kalau pemicunya sukses (centang hijau)
    if: >
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 📦 AMBIL ASET FRONTEND: Download hasil compile Laravel Mix v6 dari workflow sebelah
      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: public/

      # 🚀 DEPLOY KE AZURE APP SERVICE
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Microsoft.Web-WebApp-Portal-00fe6bab-85ea' # 💡 Pastikan ini nama Web App kamu di Azure ya bub!
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
