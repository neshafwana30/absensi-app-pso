name: Continuous Deployment to Staging

on:
  push:
    branches: ["development"]

jobs:

  # ==========================================
  # 1. BACKEND SETUP (PHP + COMPOSER)
  # ==========================================
  backend-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      # Composer
      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

  # ==========================================
  # 2. FRONTEND BUILD (NODE + NPM)
  # ==========================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node
      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      # Install dependency versi terkunci
      - name: Install Frontend Dependencies
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps

      # Build frontend
      - name: Compile Assets
        run: npm run prod

  # ==========================================
  # 3. LARAVEL CLEANUP
  # ==========================================
  laravel-cleanup:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      # Laravel cleanup
      - name: Laravel Cleanup
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

  # ==========================================
  # 4. BUILD DOCKER IMAGE
  # ==========================================
  docker-build:
    runs-on: ubuntu-latest
    needs: laravel-cleanup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t neshafwana/absensi-app:latest .

  # ==========================================
  # 5. LOGIN TO DOCKER HUB
  # ==========================================
  docker-login:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  # ==========================================
  # 6. PUSH IMAGE TO DOCKER HUB
  # ==========================================
  docker-push:
    runs-on: ubuntu-latest
    needs: docker-login

    steps:
      - name: Push Docker Image
        run: |
          docker push neshafwana/absensi-app:latest