name: CI/CD Docker Deployment to Azure

on:
  push:
    branches:
      - development

jobs:
  # ==========================================
  # 1. BACKEND SETUP (PHP + COMPOSER)
  # ==========================================
  backend-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Install Composer Dependencies
        run: |
          composer install \
          --no-interaction \
          --prefer-dist \
          --optimize-autoloader \
          --no-dev

  # ==========================================
  # 2. FRONTEND BUILD (NODE + LARAVEL MIX)
  # ==========================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-setup

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps

      - name: Compile Frontend Assets
        run: |
          npm run prod

  # ==========================================
  # 3. BUILD DOCKER IMAGE
  # ==========================================
  docker-build:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t neshafwana/absensi-app:latest .

  # ==========================================
  # 4. LOGIN TO DOCKER HUB
  # ==========================================
  docker-login:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  # ==========================================
  # 5. PUSH IMAGE TO DOCKER HUB
  # ==========================================
  docker-push:
    runs-on: ubuntu-latest
    needs: docker-login

    steps:
      - name: Push Docker Image
        run: |
          docker push neshafwana/absensi-app:latest
