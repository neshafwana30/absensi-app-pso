name: Continuous Deployment to Staging

on:
  push:
    branches: ["aul"]

jobs:
  # ==========================================
  # JOB 1: BACKEND BUILD
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      # Kita simpan folder vendor agar bisa dipakai job lain
      - name: Upload Vendor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-vendor
          path: vendor/

  # ==========================================
  # JOB 2: FRONTEND BUILD
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps

      - name: Compile Frontend Assets
        run: npm run prod

      # Kita simpan folder public/mix-manifest.json atau hasil compile asset-nya
      - name: Upload Public Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-assets
          path: public/

  # ==========================================
  # JOB 3: DOCKER BUILD & PUSH
  # ==========================================
  deploy-docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # Menunggu job backend & frontend selesai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ambil kembali folder vendor yang di-upload Job 1
      - name: Download Vendor Artifact
        uses: actions/download-artifact@v4
        with:
          name: php-vendor
          path: vendor/

      # Ambil kembali hasil compile frontend dari Job 2
      - name: Download Public Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: public-assets
          path: public/

      - name: Laravel Cleanup
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

