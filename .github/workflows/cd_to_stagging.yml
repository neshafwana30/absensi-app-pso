name: Continuous Deployment to Staging

on:
  push:
    branches: ["development"]

jobs:
  # 🧪 JOB 1: Jalankan Testing PHPUnit (Copied 100% dari kode berhasilmu!)
  run-phpunit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 💡 Menggunakan PHP 8.1 sesuai spek suci kelompokmu
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      - name: Run Migrations for Testing
        run: php artisan migrate --force --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau          
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}

      - name: Execute PHPUnit Tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau          
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}

  # 📦 JOB 2: Jalankan Build Frontend (Copied 100% dari kode berhasilmu!)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16" # Perbaikan typo dari node-node
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Compile Assets (NPM Run Prod)
        run: npm run prod

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-frontend-assets # Kita bedakan namanya sedikit agar unik
          path: public/

  # 🚀 JOB 3: DEPLOY KE AZURE APP SERVICE (Hanya jalan kalau JOB 1 & JOB 2 SUKSES!)
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: [run-phpunit-test, build-frontend] # 🔐 KUNCI GERBANG AMAN!
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-frontend-assets
          path: public/

      # Mendarat live di Azure Jepang dengan selamat
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Microsoft.Web-WebApp-Portal-00fe6bab-85ea"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .