name: Continuous Deployment to Staging

on:
  push:
    branches: ["development"] # <--- Menembak branch development sesuai spek suci kelompokmu

jobs:
  # ==========================================
  # 🧪 JOB 1: Jalankan Testing PHPUnit
  # ==========================================
  run-phpunit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 💡 Menggunakan PHP 8.1 sesuai spek suci kelompokmu
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      - name: Run Migrations for Testing
        run: php artisan migrate --force --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}

      # 📌 SEEDER DI SINI: Menyuntikkan data master sebelum PHPUnit Test dieksekusi
      - name: Run Seeders for Testing
        run: php artisan db:seed --force --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}

      - name: Execute PHPUnit Tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: absensi-app-pso.postgres.database.azure.com
          DB_PORT: 5432
          DB_DATABASE: db_absensi_testing
          DB_USERNAME: dev_kicau
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_AZURE }}

      # 📦 Bungkus folder vendor yang lolos test untuk dikirim ke Job 3
      - name: Upload Backend Vendor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-backend-vendor
          path: vendor/

  # ==========================================
  # 📦 JOB 2: Jalankan Build Frontend
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Compile Assets (NPM Run Prod)
        run: npm run prod

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-frontend-assets
          path: public/

  # ==========================================
  # 🚀 JOB 3: DEPLOY KE AZURE APP SERVICE
  # ==========================================
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: [run-phpunit-test, build-frontend] # 🔐 Hanya jalan kalau test dan build frontend sukses!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 📥 Ambil folder vendor PHP dari Job 1
      - name: Download Backend Vendor Artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-backend-vendor
          path: vendor/

      # 📥 Ambil hasil compile CSS/JS dari Job 2
      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-frontend-assets
          path: public/

      # 🧹 Pembersihan cache Laravel sebelum masuk zip deployment Azure
      - name: Laravel Optimization Cleanup
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
