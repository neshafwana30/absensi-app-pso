name: Continuous Deployment to Staging

on:
  push:
    branches: ["development"]

jobs:
  # 🧪 JOB 1: Jalankan Testing PHPUnit duluan
  run-phpunit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, pdo-pgsql

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --prefer-dist

      - name: Run Testing
        run: ./vendor/bin/phpunit

  # 📦 JOB 2: Jalankan Build Frontend (Bisa barengan atau nunggu)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install & Compile Frontend
        run: |
          npm ci
          npm run prod

      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-frontend-assets
          path: public/

  # 🚀 JOB 3: DEPLOY KE AZURE (Hanya jalan kalau JOB 1 & JOB 2 SUKSES!)
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: [run-phpunit-test, build-frontend] # 🔐 GERBANG KEAMANAN MUTLAK IDAMANMU!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-frontend-assets
          path: public/

      # Mendarat live di Azure Jepang
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Microsoft.Web-WebApp-Portal-00fe6bab-85ea"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
