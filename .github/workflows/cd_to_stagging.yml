name: Continuous Deployment to Staging

on:
  push:
    branches: ["development"]

jobs:
  # ==========================================
  # JOB 1: BACKEND BUILD & AUTOMATED TESTING
  # ==========================================
  build-backend:
    runs-on: ubuntu-latest

    # 🐳 Kita panggil container database kilat khusus buat jalanin PHPUnit Testing
    services:
      postgres_test:
        image: postgres:15
        env:
          POSTGRES_DB: absensi_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, pdo, pdo_pgsql, pgsql
          coverage: none # Dimatikan biar proses testing makin cepat & hemat kuota!

      - name: Install PHP Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      # 🧪 MEMULAI RITUAL AUTOMATED TESTING (FOLDER tests/Feature)
      - name: Run Feature and Unit Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1 # Nembak ke service container di atas
          DB_PORT: 5432
          DB_DATABASE: absensi_test_db
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          APP_ENV: testing
          APP_KEY: base64:uP3b4RInT4hAnAnD4sY4HdaYAhBcaWHz712345= # Dummy Key buat test
        run: |
          php artisan migrate --force
          php artisan test

      # Jika test di atas LULUS, simpan folder vendor untuk dideploy
      - name: Upload Vendor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-vendor
          path: vendor/

  # ==========================================
  # JOB 2: FRONTEND BUILD
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: |
          npm install laravel-mix@6.0.43 webpack@5.65.0 webpack-cli@4.9.1 postcss@8.4.5 --save-dev --legacy-peer-deps

      - name: Compile Frontend Assets
        run: npm run prod

      - name: Upload Public Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-assets
          path: public/

  # ==========================================
  # JOB 3: DOCKER BUILD & PUSH TO REPO
  # ==========================================
  deploy-docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # Menunggu job backend (testing) & frontend selesai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ambil kembali folder vendor dari Job 1
      - name: Download Vendor Artifact
        uses: actions/download-artifact@v4
        with:
          name: php-vendor
          path: vendor/

      # Ambil kembali hasil compile frontend dari Job 2
      - name: Download Public Assets Artifact
        uses: actions/download-artifact@v4
        with:
          name: public-assets
          path: public/

      - name: Laravel Cleanup
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      # 🐳 1. BUILD IMAGE DOCKER SEKARANG RESMI AKTIF
      - name: Build Docker Image
        run: |
          docker build -t neshafwana/absensi-app:latest .

      # 🔑 2. LOGIN KE DOCKER HUB KAMU
      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🚀 3. PUSH IMAGE KE REPO NESHA_FWANA
      - name: Push Docker Image
        run: |
          docker push neshafwana/absensi-app:latest
